name: Deploy Landing + Docs

on:
  push:
    branches: [main]

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repo
      - uses: actions/checkout@v4

      # 2. Build MkDocs documentation → generates site/
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build MkDocs site
        run: mkdocs build

      # 3. Build Landing Page (React/Vite) → generates landing/dist/
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install landing page dependencies
        working-directory: landing
        run: npm install

      - name: Build landing page
        working-directory: landing
        run: |
          chmod +x node_modules/.bin/vite
          npx vite build
        env:
          VITE_BASE_PATH: "/"

      # 4. Combine: landing page overwrites the MkDocs index
      - name: Combine landing page with docs
        run: |
          # Copy landing page's main HTML as the site root
          cp landing/dist/index.html site/index.html

          # Copy landing assets to a separate folder to avoid conflicts
          mkdir -p site/landing-assets
          cp -r landing/dist/assets/* site/landing-assets/

          # Copy videos
          mkdir -p site/videos
          cp -r landing/dist/videos/* site/videos/ 2>/dev/null || true
          cp landing/dist/*.mp4 site/ 2>/dev/null || true

          # Fix asset paths in index.html: /assets/ → /landing-assets/
          sed -i 's|/assets/|/landing-assets/|g' site/index.html
          sed -i 's|"/assets/|"/landing-assets/|g' site/index.html

      # 5. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: quadcontrol.io